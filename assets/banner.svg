<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .title { fill: #f1f5f9; }
        .sub { fill: #94a3b8; }
        .pill-bg { fill: #1e293b; }
      }
    </style>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff7ed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect class="bg" width="800" height="200" rx="16" fill="url(#bgGrad)"/>

  <!-- Spark icon: elegant 4-point star with glow -->
  <g transform="translate(110,100)">
    <circle cx="0" cy="0" r="42" fill="#fef3c7" opacity="0.5"/>
    <circle cx="0" cy="0" r="28" fill="#fde68a" opacity="0.3"/>
    <path d="M0,-32 C4,-10 10,-4 32,0 C10,4 4,10 0,32 C-4,10 -10,4 -32,0 C-10,-4 -4,-10 0,-32Z" fill="url(#sparkGrad)"/>
    <path d="M0,-14 C2,-5 5,-2 14,0 C5,2 2,5 0,14 C-2,5 -5,2 -14,0 C-5,-2 -2,-5 0,-14Z" fill="#fef3c7"/>
    <circle cx="22" cy="-22" r="2.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="-26" cy="-16" r="1.8" fill="#f59e0b" opacity="0.5"/>
    <circle cx="16" cy="24" r="2" fill="#fbbf24" opacity="0.6"/>
  </g>

  <text x="430" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="bold" class="title" fill="#1e293b">
    Idea Spark
  </text>
  <text x="430" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" class="sub" fill="#64748b">
    AI 驱动的学术研究想法孵化器 — 一个方向，激发多个创新角度
  </text>

  <!-- Pills -->
  <rect x="280" y="130" width="120" height="26" rx="13" class="pill-bg" fill="#1e293b"/>
  <text x="340" y="148" text-anchor="middle" font-family="monospace" font-size="12" fill="#fbbf24">
    /idea-spark
  </text>
  <rect x="415" y="130" width="140" height="26" rx="13" class="pill-bg" fill="#1e293b"/>
  <text x="485" y="148" text-anchor="middle" font-family="monospace" font-size="12" fill="#60a5fa">
    OB · 管理学 · AI
  </text>
</svg>
